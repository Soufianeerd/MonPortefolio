    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --bg-main: #f5f4f0;
            --device-bg: #ffffff;
            --screen-bg: #0a0a0a;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            
            --radius-xl: 48px;
            --radius-lg: 24px;
            --shadow-premium: 0 40px 100px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .info-side {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .badge {
            align-self: flex-start;
            padding: 8px 16px;
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
        }

        .desc {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 360px;
        }

        .play-btn {
            align-self: flex-start;
            padding: 16px 32px;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: translateY(-2px);
        }

        /* Device Side */
        .device-side {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .monitor-frame {
            background: var(--device-bg);
            padding: 40px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .screen-container {
            background: var(--screen-bg);
            width: 400px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 8px solid #1a1a1a;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Source Code Pro', monospace;
            color: var(--neon-green);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-display {
            position: absolute;
            bottom: -30px;
            left: 40px;
            font-family: 'Source Code Pro', monospace;
            font-weight: 800;
            font-size: 14px;
            color: var(--text-muted);
        }

        #score { color: var(--text-main); }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 40px;
                text-align: center;
            }
            .info-side { align-items: center; }
            h1 { font-size: 48px; }
            .monitor-frame { padding: 20px; border-radius: 30px; }
            .screen-container { width: 300px; height: 300px; }
        }

<body>

    <a href="../../index.html" class="back-btn">&larr; Portfolio</a>

    <div class="app-container">
        <!-- Text Side -->
        <div class="info-side">
            <div class="badge">WebAssembly • PyScript</div>
            <h1>Snake <br> <span style="color: #ccc">WASM.</span></h1>
            <p class="desc">Un jeu culte revisité, codé en Python natif et tournant à haute performance grâce à WebAssembly.</p>
            <button class="play-btn" id="start-btn-external">
                Jouer maintenant &rarr;
            </button>
        </div>

        <!-- Game Side -->
        <div class="device-side">
            <div class="monitor-frame">
                <div class="screen-container">
                    <div class="loading" id="loading">WASM_INITIALIZING...</div>
                    <canvas id="gameCanvas" width="400" height="400"></canvas>
                    
                    <div id="start-overlay">
                        <button id="start-btn" style="background: var(--neon-green); border: none; padding: 12px 24px; font-weight: 800; border-radius: 8px; cursor: pointer; box-shadow: 0 0 20px var(--neon-green);">
                            DÉMARRER
                        </button>
                    </div>
                </div>
                <div class="score-display">PTS // <span id="score">000</span></div>
            </div>
        </div>
    </div>

    <!-- The Game Logic -->
    <script type="py">
import asyncio
import random
from js import document, window, console
from pyodide.ffi import create_proxy

# Configuration
CANVAS_SIZE = 400
GRID_SIZE = 20
TILE_COUNT = CANVAS_SIZE // GRID_SIZE
SPEED = 0.10

# Colors
COLOR_BG = "#0a0a0a"
COLOR_SNAKE = "#39ff14"
COLOR_FOOD = "#ff00ff"

class SnakeGame:
    def __init__(self):
        try:
            self.canvas = document.getElementById("gameCanvas")
            self.ctx = self.canvas.getContext("2d")
            self.score_el = document.getElementById("score")
            self.start_overlay = document.getElementById("start-overlay")
            
            # Initial Draw
            self.ctx.fillStyle = COLOR_BG
            self.ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE)
            
            self.running = False
            self.game_over = False
            self.snake = []
            self.food = None
            self.velocity = (0, 0)
            self.score = 0
            
            # Bind Start Buttons
            self.start_proxy = create_proxy(self.start_game)
            start_btn = document.getElementById("start-btn")
            if start_btn:
                start_btn.addEventListener("click", self.start_proxy)
            
            start_btn_ext = document.getElementById("start-btn-external")
            if start_btn_ext:
                start_btn_ext.addEventListener("click", self.start_proxy)

            # Bind controls (global)
            self.key_handler_proxy = create_proxy(self.handle_keydown)
            window.addEventListener("keydown", self.key_handler_proxy)
            
            # Hide loading screen when Python is ready
            loading = document.getElementById("loading")
            if loading:
                loading.style.display = "none"
            
            console.log("Snake Game Initialized Successfully")
            
        except Exception as e:
            console.error(f"Error init: {e}")
            print(f"Error init: {e}")

    def start_game(self, event):
        if self.start_overlay:
            self.start_overlay.style.display = "none"
        self.reset()
        if not self.running:
            self.running = True
            asyncio.ensure_future(self.game_loop())

    def reset(self):
        self.snake = [(10, 10), (10, 11), (10, 12)] # Head is first
        self.velocity = (0, -1) # Moving Up
        self.food = self.spawn_food()
        self.score = 0
        self.game_over = False
        self.update_score()

    def spawn_food(self):
        while True:
            x = random.randint(0, TILE_COUNT - 1)
            y = random.randint(0, TILE_COUNT - 1)
            if (x, y) not in self.snake:
                return (x, y)

    def handle_keydown(self, event):
        try:
            key = event.code
            
            # Prevent scrolling with arrows
            if key in ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"]:
                event.preventDefault()

            # Restart
            if self.game_over and key == "Space":
                self.reset()
                return

            # Directions (prevent 180 turns)
            vx, vy = self.velocity
            
            if key == "ArrowUp" and vy != 1:
                self.velocity = (0, -1)
            elif key == "ArrowDown" and vy != -1:
                self.velocity = (0, 1)
            elif key == "ArrowLeft" and vx != 1:
                self.velocity = (-1, 0)
            elif key == "ArrowRight" and vx != -1:
                self.velocity = (1, 0)
        except Exception as e:
            console.error(f"Input error: {e}")

    def update(self):
        if self.game_over:
            return

        # Move Head
        head_x, head_y = self.snake[0]
        vx, vy = self.velocity
        
        new_head = (head_x + vx, head_y + vy)
        
        # Check Collisions (Walls)
        if (new_head[0] < 0 or new_head[0] >= TILE_COUNT or 
            new_head[1] < 0 or new_head[1] >= TILE_COUNT):
            self.game_over = True
            return

        # Check Self Collision
        if new_head in self.snake:
            self.game_over = True
            return

        self.snake.insert(0, new_head)

        # Check Food
        if new_head == self.food:
            self.score += 10
            self.update_score()
            self.food = self.spawn_food()
        else:
            self.snake.pop() # Remove tail

    def draw(self):
        # Clear
        self.ctx.fillStyle = COLOR_BG
        self.ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE)

        # Draw Food
        if self.food:
            self.ctx.fillStyle = COLOR_FOOD
            self.ctx.shadowBlur = 15
            self.ctx.shadowColor = COLOR_FOOD
            fx, fy = self.food
            self.ctx.fillRect(fx * GRID_SIZE, fy * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2)

        # Draw Snake
        self.ctx.fillStyle = COLOR_SNAKE
        self.ctx.shadowBlur = 10
        self.ctx.shadowColor = COLOR_SNAKE
        
        for i, (x, y) in enumerate(self.snake):
            # Head glow is stronger
            if i == 0:
                self.ctx.shadowBlur = 20
            else:
                 self.ctx.shadowBlur = 0
            
            self.ctx.fillRect(x * GRID_SIZE, y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2)

        # Game Over Text
        if self.game_over:
            self.ctx.fillStyle = "white"
            self.ctx.font = "40px 'Source Code Pro'"
            self.ctx.textAlign = "center"
            self.ctx.shadowBlur = 0
            self.ctx.fillText("GAME OVER", CANVAS_SIZE // 2, CANVAS_SIZE // 2)
            self.ctx.font = "20px 'Source Code Pro'"
            self.ctx.fillText("Press SPACE to Restart", CANVAS_SIZE // 2, CANVAS_SIZE // 2 + 40)

    def update_score(self):
        self.score_el.innerText = str(self.score).zfill(3)

    async def game_loop(self):
        while True:
            if not self.game_over:
                self.update()
            self.draw()
            await asyncio.sleep(SPEED)

# Start Game Instance
try:
    game = SnakeGame()
except Exception as e:
    console.error(f"Global error: {e}")
    print(f"Global error: {e}")
    </script>
