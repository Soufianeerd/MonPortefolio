<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fdfbf7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AirAlert">
  <title>AirAlert PWA — Suivi & Performance</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="app">
    <div id="content">
      <!-- HOME -->
      <div class="screen active" id="screen-home">
        <div class="screen-header">
          <div>
            <div class="screen-title" id="home-greeting">Bonjour 👋</div>
            <div class="screen-sub" id="home-date">Prêt à dépasser vos limites ?</div>
          </div>
        </div>
        <div id="today-card-wrap"></div>
        <div class="week-strip" id="week-strip"></div>
        <div class="stat-row" id="home-stats"></div>
        <div class="card" id="air-status-card"></div>
      </div>

      <!-- PLANNING -->
      <div class="screen" id="screen-planning">
        <div class="screen-header">
          <div>
            <div class="screen-title">Planning</div>
            <div class="screen-sub">Vos 7 prochains jours</div>
          </div>
        </div>
        <div class="week-toggle">
          <div class="week-toggle-btn active" onclick="setParity(1)">Semaine impaire</div>
          <div class="week-toggle-btn" onclick="setParity(0)">Semaine paire</div>
        </div>
        <div id="planning-list"></div>
      </div>

      <!-- SUIVI -->
      <div class="screen" id="screen-suivi">
        <div class="screen-header">
          <div>
            <div class="screen-title">Performances</div>
            <div class="screen-sub">Analysez votre progression</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Progression de la détente</div>
          <div class="chart-wrap"><canvas id="performanceChart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">Historique</div>
          <div id="history-list"></div>
        </div>
      </div>
    </div><!-- /content -->

    <nav id="nav">
      <div class="nav-item active" onclick="showScreen('home')" id="nav-home">
        <div class="nav-icon">🏠</div>
        <div class="nav-label">Accueil</div>
      </div>
      <div class="nav-item" onclick="showScreen('planning')" id="nav-planning">
        <div class="nav-icon">📅</div>
        <div class="nav-label">Planning</div>
      </div>
      <div class="nav-item" onclick="showScreen('suivi')" id="nav-suivi">
        <div class="nav-label">Suivi</div>
        <div class="nav-icon">📈</div>
      </div>
    </nav>
  </div>

  <script src="app.js"></script>
</body>

</html>
