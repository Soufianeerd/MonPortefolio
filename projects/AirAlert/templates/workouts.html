<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entraînements | AirAlert</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <!-- Header -->
    <header class="dash-header">
        <div class="container dash-header-inner">
            <div class="header-left">
                <a href="/dashboard" class="back-link"><i class="fas fa-chevron-left"></i></a>
                <div class="welcome">
                    <h1>Entraînements</h1>
                    <p>Enregistrez vos efforts</p>
                </div>
            </div>
            <div class="header-right">
                <button class="add-btn-circle" id="toggle-form"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </header>

    <main class="dash-content container">
        
        <!-- Add Workout Form -->
        <section class="workout-form-section" id="workout-form-wrapper" style="display: none;">
            <div class="premium-form-card">
                <h3>Nouvel Entraînement</h3>
                <form id="workout-form">
                    <div class="form-group">
                        <label>Type d'entraînement</label>
                        <select id="workout_type" required>
                            <option value="Basketball">Basketball</option>
                            <option value="Calisthenics">Calisthenics</option>
                            <option value="Cardio">Cardio</option>
                            <option value="Force">Force</option>
                            <option value="Mobilité">Mobilité</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Durée (min)</label>
                            <input type="number" id="duration" placeholder="45" required>
                        </div>
                        <div class="form-group">
                            <label>Calories</label>
                            <input type="number" id="calories" placeholder="350" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Détente (cm)</label>
                            <input type="number" id="vertical_jump" placeholder="60">
                        </div>
                        <div class="form-group">
                            <label>Répétitions</label>
                            <input type="number" id="reps" placeholder="100">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="notes" placeholder="Comment s'est passée la séance ?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Enregistrer l'effort</button>
                </form>
            </div>
        </section>

        <!-- History Section -->
        <section class="history-section">
            <div class="section-header">
                <h3>Historique</h3>
                <span id="workout-count">0 séances</span>
            </div>

            <div class="history-list" id="history-list">
                <!-- Loader / Empty state -->
                <div class="empty-state" id="empty-state">
                    <i class="fas fa-dumbbell"></i>
                    <p>Aucun entraînement enregistré.<br>Commencez dès aujourd'hui !</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="container nav-inner">
            <a href="/" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Dash</span>
            </a>
            <a href="/workouts" class="nav-item active">
                <i class="fas fa-dumbbell"></i>
                <span>Workouts</span>
            </a>
            <a href="/goals" class="nav-item">
                <i class="fas fa-bullseye"></i>
                <span>Goals</span>
            </a>
            <a href="/profile" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Entraînement enregistré !</div>

    <script src="{{ url_for('static', filename='js/workouts.js') }}"></script>
</body>
</html>
