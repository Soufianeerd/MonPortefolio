<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | AirAlert</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <!-- Header -->
    <header class="dash-header">
        <div class="container dash-header-inner">
            <div class="header-left">
                <a href="/" class="back-link"><i class="fas fa-chevron-left"></i></a>
                <div class="welcome">
                    <h1>Bonjour Soufiane</h1>
                    <p id="current-date">Mardi 12 Mai</p>
                </div>
            </div>
            <div class="header-right">
                <div class="avatar"></div>
            </div>
        </div>
    </header>

    <main class="dash-content container">
        <p class="greeting-sub">Prêt à progresser aujourd’hui ?</p>

        <!-- Main Score Card -->
        <section class="main-card-wrapper">
            <div class="score-card">
                <div class="score-info">
                    <span class="score-label">Performance Score</span>
                    <h2 id="perf-score">87</h2>
                    <p class="score-status">Très bonne progression</p>
                    <div class="score-trend">
                        <i class="fas fa-arrow-up"></i> +8% cette semaine
                    </div>
                </div>
                <div class="score-visual">
                    <svg viewBox="0 0 100 100" class="progress-ring">
                        <circle class="progress-ring-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="progress-ring-fill" id="perf-ring" cx="50" cy="50" r="45"></circle>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Quick Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon jump"><i class="fas fa-ruler-vertical"></i></div>
                <div class="stat-val">
                    <span id="stat-jump">62 cm</span>
                    <label>Détente</label>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon time"><i class="fas fa-clock"></i></div>
                <div class="stat-val">
                    <span id="stat-time">48 min</span>
                    <label>Temps</label>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon cal"><i class="fas fa-fire"></i></div>
                <div class="stat-val">
                    <span id="stat-cal">420 kcal</span>
                    <label>Calories</label>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon streak"><i class="fas fa-bolt"></i></div>
                <div class="stat-val">
                    <span id="stat-streak">12 j</span>
                    <label>Streak</label>
                </div>
            </div>
        </section>

        <!-- Progression Chart -->
        <section class="chart-section">
            <div class="section-header">
                <h3>Progression Hebdomadaire</h3>
                <span>7 derniers jours</span>
            </div>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
        </section>

        <!-- Goals Section -->
        <section class="goals-section">
            <h3>Objectifs du jour</h3>
            <div class="goals-list" id="goals-list">
                <!-- Goals injected by JS -->
            </div>
        </section>

        <!-- Badges Section -->
        <section class="badges-section">
            <h3>Badges débloqués</h3>
            <div class="badges-grid" id="badges-grid">
                <!-- Badges injected by JS -->
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="container nav-inner">
            <a href="/" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/dashboard" class="nav-item active">
                <i class="fas fa-chart-pie"></i>
                <span>Dash</span>
            </a>
            <a href="/workouts" class="nav-item">
                <i class="fas fa-dumbbell"></i>
                <span>Workouts</span>
            </a>
            <a href="/goals" class="nav-item">
                <i class="fas fa-bullseye"></i>
                <span>Goals</span>
            </a>
            <a href="/profile" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
