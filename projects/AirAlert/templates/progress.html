<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analyses | AirAlert</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <header class="dash-header">
        <div class="container dash-header-inner">
            <div class="header-left">
                <a href="/dashboard" class="back-link"><i class="fas fa-chevron-left"></i></a>
                <div class="welcome">
                    <h1>Analyses</h1>
                    <p>Visualisez vos progrès</p>
                </div>
            </div>
            <div class="header-right">
                <div class="avatar"></div>
            </div>
        </div>
    </header>

    <main class="dash-content container">
        
        <!-- Summary Section -->
        <section class="summary-cards">
            <div class="summary-card">
                <label>Total Séances</label>
                <strong id="total-workouts">--</strong>
            </div>
            <div class="summary-card">
                <label>Record Détente</label>
                <strong id="record-jump">-- cm</strong>
            </div>
            <div class="summary-card">
                <label>Calories</label>
                <strong id="total-cals">--</strong>
            </div>
            <div class="summary-card">
                <label>Temps Moyen</label>
                <strong id="avg-time">-- min</strong>
            </div>
        </section>

        <!-- Insights -->
        <section class="insight-box" id="insight-container">
            <i class="fas fa-lightbulb"></i>
            <p id="insight-text">Chargement de vos analyses...</p>
        </section>

        <!-- Charts Grid -->
        <section class="charts-grid-analytics">
            <div class="analytics-card">
                <h3>Évolution Détente</h3>
                <div class="chart-box"><canvas id="jumpChart"></canvas></div>
            </div>
            <div class="analytics-card">
                <h3>Volume d'entraînement (min)</h3>
                <div class="chart-box"><canvas id="timeChart"></canvas></div>
            </div>
            <div class="analytics-card">
                <h3>Calories brûlées</h3>
                <div class="chart-box"><canvas id="calChart"></canvas></div>
            </div>
        </section>

        <!-- Recent Timeline -->
        <section class="timeline-section">
            <h3>Activité Récente</h3>
            <div class="timeline-list" id="timeline-list">
                <!-- Timeline items injected by JS -->
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="container nav-inner">
            <a href="/" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Dash</span>
            </a>
            <a href="/workouts" class="nav-item">
                <i class="fas fa-dumbbell"></i>
                <span>Workouts</span>
            </a>
            <a href="/goals" class="nav-item">
                <i class="fas fa-bullseye"></i>
                <span>Goals</span>
            </a>
            <a href="/profile" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <script src="{{ url_for('static', filename='js/progress.js') }}"></script>
</body>
</html>
