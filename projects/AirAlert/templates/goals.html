<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Objectifs | AirAlert</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <header class="dash-header">
        <div class="container dash-header-inner">
            <div class="header-left">
                <a href="/dashboard" class="back-link"><i class="fas fa-chevron-left"></i></a>
                <div class="welcome">
                    <h1>Objectifs</h1>
                    <p>Dépassez vos limites</p>
                </div>
            </div>
            <div class="header-right">
                <button class="add-btn-circle" id="toggle-goal-form"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </header>

    <main class="dash-content container">
        
        <!-- Add Goal Form -->
        <section class="workout-form-section" id="goal-form-wrapper" style="display: none;">
            <div class="premium-form-card">
                <h3>Nouvel Objectif</h3>
                <form id="goal-form">
                    <div class="form-group">
                        <label>Titre de l'objectif</label>
                        <input type="text" id="goal_title" placeholder="Ex: Atteindre 70cm de détente" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Cible</label>
                            <input type="number" id="goal_target" placeholder="70" required>
                        </div>
                        <div class="form-group">
                            <label>Unité</label>
                            <select id="goal_unit">
                                <option value="cm">cm</option>
                                <option value="kg">kg</option>
                                <option value="minutes">min</option>
                                <option value="reps">reps</option>
                                <option value="jours">jours</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Créer l'objectif</button>
                </form>
            </div>
        </section>

        <!-- Goals List -->
        <section class="goals-list-section">
            <div class="section-header">
                <h3>Mes Défis</h3>
                <span id="goals-count">0 objectifs</span>
            </div>
            <div class="goals-grid-full" id="goals-container">
                <!-- Goals cards injected by JS -->
                <div class="empty-state">
                    <i class="fas fa-bullseye"></i>
                    <p>Aucun objectif actif.<br>Fixez votre premier défi !</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="container nav-inner">
            <a href="/" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Dash</span>
            </a>
            <a href="/workouts" class="nav-item">
                <i class="fas fa-dumbbell"></i>
                <span>Workouts</span>
            </a>
            <a href="/goals" class="nav-item active">
                <i class="fas fa-bullseye"></i>
                <span>Goals</span>
            </a>
            <a href="/profile" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <div id="toast" class="toast">Objectif mis à jour !</div>

    <script src="{{ url_for('static', filename='js/goals.js') }}"></script>
</body>
</html>
