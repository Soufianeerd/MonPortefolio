<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fbe9dd"/>
    <stop offset="100%" stop-color="#faf7f2"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#d97757" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#d97757" opacity="0.13"/>
  </pattern>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<rect width="600" height="400" fill="url(#dots)"/>
<rect width="600" height="400" fill="url(#glow)"/>

<g transform="translate(300 200)">
  <circle r="120" fill="#1c1917"/>
  <circle r="100" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <g fill="#d97757">
    <path d="M0 -90 L78 -45 L0 0 Z" opacity="0.85"/>
    <path d="M78 -45 L78 45 L0 0 Z" opacity="0.7"/>
    <path d="M78 45 L0 90 L0 0 Z" opacity="0.85"/>
    <path d="M0 90 L-78 45 L0 0 Z" opacity="0.7"/>
    <path d="M-78 45 L-78 -45 L0 0 Z" opacity="0.85"/>
    <path d="M-78 -45 L0 -90 L0 0 Z" opacity="0.7"/>
  </g>
  <circle r="22" fill="#1c1917"/>
  <circle r="14" fill="white" opacity="0.15"/>
</g>
<g fill="#1c1917" font-family="Outfit, sans-serif" font-weight="900">
  <text x="300" y="370" text-anchor="middle" font-size="14" letter-spacing="5">SHOOTEVENT PRO</text>
</g>

</svg>