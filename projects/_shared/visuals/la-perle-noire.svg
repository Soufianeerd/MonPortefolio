<circle cx="300" cy="200" r="140" fill="none" stroke="#d97757" stroke-width="1" opacity="0.25"/>
<g stroke="#c2410c" stroke-width="1.5" fill="none" opacity="0.8">
  <path d="M150 200 Q170 200 180 180"/>
  <path d="M450 200 Q430 200 420 180"/>
