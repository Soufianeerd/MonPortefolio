<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fbe9dd"/>
    <stop offset="100%" stop-color="#faf7f2"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#d97757" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#d97757" opacity="0.13"/>
  </pattern>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<rect width="600" height="400" fill="url(#dots)"/>
<rect width="600" height="400" fill="url(#glow)"/>

<circle cx="300" cy="200" r="120" fill="#1c1917"/>
<circle cx="300" cy="200" r="105" fill="none" stroke="#d97757" stroke-width="2"/>
<circle cx="300" cy="200" r="80" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.6"/>
<circle cx="300" cy="200" r="55" fill="#d97757"/>
<circle cx="300" cy="200" r="35" fill="#1c1917"/>
<circle cx="285" cy="185" r="10" fill="white" opacity="0.4"/>
<g stroke="#d97757" stroke-width="2" opacity="0.55">
  <line x1="300" y1="80" x2="300" y2="100"/>
  <line x1="300" y1="300" x2="300" y2="320"/>
  <line x1="180" y1="200" x2="200" y2="200"/>
  <line x1="400" y1="200" x2="420" y2="200"/>
</g>
<g fill="#1c1917" font-family="Outfit, sans-serif" font-weight="900">
  <text x="300" y="370" text-anchor="middle" font-size="14" letter-spacing="6">SINA PRODUCTION</text>
</g>

</svg>