<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fbe9dd"/>
    <stop offset="100%" stop-color="#faf7f2"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#d97757" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#d97757" opacity="0.13"/>
  </pattern>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<rect width="600" height="400" fill="url(#dots)"/>
<rect width="600" height="400" fill="url(#glow)"/>

<rect x="60" y="60" width="480" height="280" rx="14" fill="#0e3818"/>
<rect x="60" y="60" width="480" height="280" rx="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
<line x1="300" y1="60" x2="300" y2="340" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
<circle cx="300" cy="200" r="50" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
<circle cx="300" cy="200" r="3" fill="rgba(255,255,255,0.5)"/>
<rect x="60" y="140" width="60" height="120" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
<rect x="480" y="140" width="60" height="120" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
<g transform="translate(300 200)">
  <circle r="22" fill="white" stroke="#1c1917" stroke-width="2"/>
  <polygon points="0,-22 12,-12 8,4 -8,4 -12,-12" fill="#1c1917" stroke="#1c1917" stroke-width="2" stroke-linejoin="round"/>
</g>
<g fill="white" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" letter-spacing="2">
  <text x="80" y="80">1998 · 2026</text>
