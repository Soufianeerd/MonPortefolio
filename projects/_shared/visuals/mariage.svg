<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fbe9dd"/>
    <stop offset="100%" stop-color="#faf7f2"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#d97757" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#d97757" opacity="0.13"/>
  </pattern>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<rect width="600" height="400" fill="url(#dots)"/>
<rect width="600" height="400" fill="url(#glow)"/>

<g transform="translate(300 200)">
  <circle cx="-35" cy="0" r="70" fill="none" stroke="#d97757" stroke-width="6"/>
  <circle cx="-35" cy="0" r="58" fill="none" stroke="#d97757" stroke-width="2" opacity="0.4"/>
  <circle cx="35" cy="0" r="70" fill="none" stroke="#1c1917" stroke-width="6"/>
  <circle cx="35" cy="0" r="58" fill="none" stroke="#1c1917" stroke-width="2" opacity="0.4"/>
  <circle cx="-35" cy="-65" r="6" fill="#d97757"/>
  <circle cx="35" cy="65" r="4" fill="#1c1917"/>
</g>
<g fill="#1c1917" font-family="Outfit, sans-serif" font-weight="900">
  <text x="300" y="80" text-anchor="middle" font-size="14" letter-spacing="6">A &amp; S</text>
  <text x="300" y="350" text-anchor="middle" font-size="10" fill="#8a857d" font-weight="500" letter-spacing="3">Wedding Suite · 2026</text>
</g>

</svg>