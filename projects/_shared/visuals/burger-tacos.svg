  <circle cx="105" cy="7" r="2" fill="#fff" opacity="0.6"/>
  <rect x="6" y="36" width="148" height="14" fill="#74e09a" rx="2"/>
  <rect x="0" y="48" width="160" height="20" fill="#d97757" rx="2"/>
  <rect x="6" y="66" width="148" height="14" fill="#fff" rx="2"/>
  <rect x="2" y="78" width="156" height="18" fill="#7c3a1f" rx="2"/>
  <ellipse cx="80" cy="100" rx="78" ry="14" fill="#d28c4d"/>
  <ellipse cx="80" cy="106" rx="78" ry="10" fill="#a9683a"/>
</g>
<g fill="#1c1917" font-family="Outfit, sans-serif" font-weight="900">
  <text x="300" y="60" text-anchor="middle" font-size="22" letter-spacing="4">BURGER &amp; TACOS</text>
