<!DOCTYPE html>
<html>
<head>
    <title>WEBS</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        canvas {
            height: 300px !important;
            width: 100% !important;
        }
    </style>
</head>

<body class="bg-light">

<div class="container-fluid p-4">

    <h3 class="mb-4 text-center">WEBS</h3>
    <div class="container mb-3">
    <label class="form-label">Taux de rafraîchissement (ms)</label>

    <input id="refreshRange" type="range" class="form-range"
           min="100" max="2000" step="100" value="2000">

    <div class="text-muted">
        Valeur : <span id="rateValue">2000</span> ms
    </div>
</div>
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm mb-3">
                <div class="card-body">

                    <h5>Visualisation 1</h5>

                    <select id="patientSelect1" class="form-select mb-2"></select>
                    <select id="activitySelect1" class="form-select mb-3"></select>
                    <div id="capteurBox1" class="mb-2"></div>
                    <canvas id="chart1"></canvas>

                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm mb-3">
                <div class="card-body">

                    <h5>Visualisation 2</h5>

                    <select id="patientSelect2" class="form-select mb-2"></select>
                    <select id="activitySelect2" class="form-select mb-3"></select>
                    <div id="capteurBox2" class="mb-2"></div>
                    <canvas id="chart2"></canvas>

                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
