<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="100%" stop-color="#f0ebe2"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#d97757" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="84" height="84" rx="20" fill="#1c1917"/>
  <text x="122" y="142" text-anchor="middle" font-family="Outfit, system-ui, sans-serif"
        font-weight="900" font-size="48" fill="#faf7f2" letter-spacing="-2">S</text>
  <circle cx="148" cy="148" r="6" fill="#d97757"/>

  <text x="180" y="135" font-family="Outfit, system-ui, sans-serif" font-weight="700" font-size="22" fill="#57534e">
    Soufiane EL RHADI
  </text>

  <!-- Heading -->
  <text x="80" y="320" font-family="Outfit, system-ui, sans-serif" font-weight="900" font-size="98"
        fill="#1c1917" letter-spacing="-4">Analyse <tspan fill="#d97757">Business</tspan>,</text>
  <text x="80" y="430" font-family="Outfit, system-ui, sans-serif" font-weight="900" font-size="98"
        fill="#1c1917" letter-spacing="-4">Data &amp; Code.</text>

  <!-- Subtitle -->
  <text x="80" y="498" font-family="Outfit, system-ui, sans-serif" font-weight="500" font-size="28" fill="#57534e">
    Étudiant MIAGE — Business Analyst &amp; Développeur Full-Stack
  </text>

  <!-- Footer chips -->
  <g font-family="Outfit, system-ui, sans-serif" font-weight="700" font-size="20" fill="#1c1917">
    <rect x="80"  y="540" width="180" height="48" rx="24" fill="#ffffff" stroke="#e7e5e0"/>
    <text x="170" y="572" text-anchor="middle">Recueil besoins</text>

    <rect x="280" y="540" width="120" height="48" rx="24" fill="#ffffff" stroke="#e7e5e0"/>
    <text x="340" y="572" text-anchor="middle">Python</text>

    <rect x="420" y="540" width="100" height="48" rx="24" fill="#ffffff" stroke="#e7e5e0"/>
    <text x="470" y="572" text-anchor="middle">SQL</text>

    <rect x="540" y="540" width="180" height="48" rx="24" fill="#ffffff" stroke="#e7e5e0"/>
    <text x="630" y="572" text-anchor="middle">Next.js / React</text>

    <rect x="740" y="540" width="120" height="48" rx="24" fill="#ffffff" stroke="#e7e5e0"/>
    <text x="800" y="572" text-anchor="middle">n8n</text>

    <rect x="880" y="540" width="180" height="48" rx="24" fill="#ffffff" stroke="#e7e5e0"/>
    <text x="970" y="572" text-anchor="middle">Apps Script</text>
  </g>

  <!-- Live dot -->
  <circle cx="1080" cy="120" r="8" fill="#d97757"/>
  <text x="1100" y="127" font-family="Outfit, system-ui, sans-serif" font-weight="600" font-size="18" fill="#1c1917">
    Disponible Sept. 2026
  </text>
</svg>
